{{ define "main" }}

<div class="container">

  <h1>{{ .Title }}</h1>

  {{ range .Pages.ByDate.Reverse }}
    <div style="margin-bottom: 2rem;">

      <small class="text-muted">
        {{ .Date.Format "2006-01-02" }}
      </small>

      <div>
        {{ .Content }}
      </div>

    </div>
  {{ end }}

</div>

{{ end }}
