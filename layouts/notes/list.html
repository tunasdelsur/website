{{ define "main" }}

<div class="container">

  <h1>{{ .Title }}</h1>

  <hr>

  {{ range .Pages.ByDate.Reverse }}
    <article style="margin-bottom: 2rem;">

      <div style="font-size: 0.9em; color: gray;">
        {{ .Date.Format "Jan 2, 2006" }}
      </div>

      <div style="margin-top: 0.5rem;">
        {{ .Content }}
      </div>

    </article>
  {{ end }}

</div>

{{ end }}
