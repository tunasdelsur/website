{{- define "main" -}}
<div class="universal-wrapper">
  <div class="row">
    <div class="col-lg-12">
      {{- if .Title -}}
      <h1>{{ .Title }}</h1>
      {{- end -}} {{- with .Content -}}
      <div class="article-style">{{ . }}</div>
      {{- end -}} {{- partial "section/publication.html" . -}}
    </div>
  </div>
</div>
{{- end -}}
